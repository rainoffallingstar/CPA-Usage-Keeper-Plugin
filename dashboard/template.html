<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage Keeper – CPA Plugin</title>
<style>
/* ============================================================
   Design Tokens
   ============================================================ */
:root {
	--bg: #ffffff;
	--surface: #f6f8fa;
	--surface-2: #ffffff;
	--surface-hover: #eaeef2;
	--surface-glass: rgba(255,255,255,0.7);
	--border: #d0d7de;
	--border-subtle: #e8ecf0;
	--text: #1f2328;
	--text-secondary: #656d76;
	--text-tertiary: #8c959f;
	--accent: #0969da;
	--accent-hover: #0860c5;
	--accent-light: rgba(9,105,218,0.08);
	--accent-glow: 0 0 0 3px rgba(9,105,218,0.12);
	--success: #1a7f37;
	--success-light: rgba(26,127,55,0.08);
	--danger: #cf222e;
	--danger-light: rgba(207,34,46,0.08);
	--warning: #9a6700;
	--warning-light: rgba(154,103,0,0.08);
	--radius-sm: 6px;
	--radius-md: 10px;
	--radius-lg: 16px;
	--radius-xl: 20px;
	--shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
	--shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
	--shadow-md: 0 4px 12px rgba(0,0,0,0.08);
	--shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
	--shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.02);
	--shadow-card-hover: 0 8px 24px rgba(0,0,0,0.1), 0 0 0 1px rgba(9,105,218,0.12);
	--transition: 0.2s ease;
	--transition-slow: 0.35s ease;
	--ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
	--ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
	--font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif;
	--font-mono: ui-monospace, SFMono-Regular, 'SF Mono', 'Cascadia Code', 'Roboto Mono', Menlo, Consolas, monospace;
}
[data-theme="dark"] {
	--bg: #0d1117;
	--surface: #161b22;
	--surface-2: #1c2330;
	--surface-hover: #21262d;
	--surface-glass: rgba(22,27,34,0.7);
	--border: #30363d;
	--border-subtle: #21262d;
	--text: #e6edf3;
	--text-secondary: #8b949e;
	--text-tertiary: #6e7681;
	--accent: #58a6ff;
	--accent-hover: #79b8ff;
	--accent-light: rgba(88,166,255,0.1);
	--accent-glow: 0 0 0 3px rgba(88,166,255,0.15);
	--success: #3fb950;
	--success-light: rgba(63,185,80,0.1);
	--danger: #f85149;
	--danger-light: rgba(248,81,73,0.1);
	--warning: #d2991d;
	--warning-light: rgba(210,153,29,0.1);
	--shadow-xs: 0 1px 2px rgba(0,0,0,0.2);
	--shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
	--shadow-md: 0 4px 12px rgba(0,0,0,0.4);
	--shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
	--shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.03);
	--shadow-card-hover: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(88,166,255,0.2);
}
@media (prefers-color-scheme: dark) {
	html:not([data-theme]) {
		--bg: #0d1117;
		--surface: #161b22;
		--surface-2: #1c2330;
		--surface-hover: #21262d;
		--surface-glass: rgba(22,27,34,0.7);
		--border: #30363d;
		--border-subtle: #21262d;
		--text: #e6edf3;
		--text-secondary: #8b949e;
		--text-tertiary: #6e7681;
		--accent: #58a6ff;
		--accent-hover: #79b8ff;
		--accent-light: rgba(88,166,255,0.1);
		--accent-glow: 0 0 0 3px rgba(88,166,255,0.15);
		--success: #3fb950;
		--success-light: rgba(63,185,80,0.1);
		--danger: #f85149;
		--danger-light: rgba(248,81,73,0.1);
		--warning: #d2991d;
		--warning-light: rgba(210,153,29,0.1);
		--shadow-xs: 0 1px 2px rgba(0,0,0,0.2);
		--shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
		--shadow-md: 0 4px 12px rgba(0,0,0,0.4);
		--shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
		--shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.03);
		--shadow-card-hover: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(88,166,255,0.2);
	}
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
	font-family: var(--font-sans);
	background: var(--bg);
	color: var(--text);
	padding: 24px;
	line-height: 1.5;
	transition: background var(--transition-slow), color var(--transition);
	-webkit-font-smoothing: antialiased;
	-moz-osx-font-smoothing: grayscale;
}

/* ============================================================
   Header
   ============================================================ */
.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 24px;
	flex-wrap: wrap;
	gap: 12px;
}
.header h1 {
	font-size: 1.5rem;
	font-weight: 700;
	letter-spacing: -0.5px;
	background: linear-gradient(135deg, var(--text) 0%%, var(--text-secondary) 100%%);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
	background-clip: text;
}
.header-right {
	display: flex;
	gap: 8px;
	align-items: center;
	flex-wrap: wrap;
}

/* ============================================================
   Form Controls
   ============================================================ */
.range-select, .refresh-select, .input {
	background: var(--surface-2);
	border: 1px solid var(--border);
	color: var(--text);
	padding: 7px 12px;
	border-radius: var(--radius-md);
	font-size: 0.85rem;
	cursor: pointer;
	transition: all var(--transition);
	font-family: var(--font-sans);
}
.range-select:hover, .refresh-select:hover {
	border-color: var(--accent);
	background: var(--surface-hover);
}
.range-select:focus, .refresh-select:focus, .input:focus {
	outline: none;
	border-color: var(--accent);
	box-shadow: var(--accent-glow);
}
.input {
	cursor: text;
	width: 100%%;
	padding: 8px 12px;
}
.input::placeholder { color: var(--text-tertiary); opacity: 0.8; }

.auto-refresh {
	display: flex;
	align-items: center;
	gap: 6px;
	font-size: 0.8rem;
	color: var(--text-secondary);
	background: var(--surface-2);
	border: 1px solid var(--border);
	border-radius: var(--radius-md);
	padding: 4px 10px;
}
.auto-refresh .dot {
	width: 7px;
	height: 7px;
	border-radius: 50%%;
	background: var(--success);
	animation: pulse 2s infinite;
	flex-shrink: 0;
	box-shadow: 0 0 8px var(--success);
}
.auto-refresh .dot.paused {
	background: var(--text-tertiary);
	animation: none;
	box-shadow: none;
}

/* ============================================================
   Buttons
   ============================================================ */
.btn {
	background: var(--surface-2);
	border: 1px solid var(--border);
	color: var(--text);
	cursor: pointer;
	border-radius: var(--radius-md);
	transition: all var(--transition);
	font-family: var(--font-sans);
	display: inline-flex;
	align-items: center;
	justify-content: center;
	gap: 6px;
	white-space: nowrap;
}
.btn:hover {
	background: var(--surface-hover);
	border-color: var(--accent);
	transform: translateY(-1px);
	box-shadow: var(--shadow-xs);
}
.btn:active { transform: translateY(0); }
.btn-icon { font-size: 1rem; line-height: 1; padding: 7px 9px; }
.btn-icon svg { width: 16px; height: 16px; }
.btn-sm { font-size: 0.8rem; padding: 5px 12px; }
.btn-xs { font-size: 0.7rem; padding: 3px 8px; }
.btn-danger { color: var(--danger); }
.btn-danger:hover {
	border-color: var(--danger);
	background: var(--danger-light);
	color: var(--danger);
}
.btn:disabled, .btn.is-loading {
	opacity: 0.6;
	pointer-events: none;
}
.btn .btn-spinner {
	width: 14px;
	height: 14px;
	animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   Animations
   ============================================================ */
@keyframes pulse {
	0%%, 100%% { opacity: 1; transform: scale(1); }
	50%% { opacity: 0.4; transform: scale(0.85); }
}

/* ============================================================
   KPI Cards
   ============================================================ */
.cards {
	display: grid;
	grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
	gap: 14px;
	margin-bottom: 24px;
}
.card {
	background: var(--surface-2);
	border: 1px solid var(--border);
	border-radius: var(--radius-lg);
	padding: 18px;
	box-shadow: var(--shadow-card);
	transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
	position: relative;
	overflow: hidden;
}
.card:hover {
	transform: translateY(-2px);
	box-shadow: var(--shadow-card-hover);
	border-color: var(--accent);
}
.card-sparkline {
	position: absolute;
	bottom: 0;
	left: 0;
	right: 0;
	height: 32px;
	opacity: 0.5;
	pointer-events: none;
}
.card-label {
	font-size: 0.68rem;
	color: var(--text-secondary);
	text-transform: uppercase;
	letter-spacing: 0.8px;
	margin-bottom: 6px;
	font-weight: 600;
}
.card-value {
	font-size: 1.6rem;
	font-weight: 700;
	font-variant-numeric: tabular-nums;
	letter-spacing: -0.5px;
	font-family: var(--font-mono);
	line-height: 1.2;
}
.card-sub {
	font-size: 0.75rem;
	color: var(--text-secondary);
	margin-top: 4px;
}

/* ============================================================
   Tabs with sliding indicator
   ============================================================ */
.tabs {
	display: flex;
	gap: 2px;
	margin-bottom: 20px;
	border-bottom: 1px solid var(--border);
	overflow-x: auto;
	position: relative;
	-webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { height: 0; }
.tab {
	padding: 9px 16px;
	cursor: pointer;
	font-size: 0.88rem;
	color: var(--text-secondary);
	border: none;
	background: none;
	white-space: nowrap;
	font-weight: 500;
	transition: color var(--transition);
	position: relative;
	z-index: 1;
}
.tab:hover { color: var(--text); }
.tab.active {
	color: var(--accent);
	font-weight: 600;
}
.tab-indicator {
	position: absolute;
	bottom: -1px;
	height: 2px;
	background: var(--accent);
	border-radius: 2px 2px 0 0;
	transition: left 0.35s var(--ease-out-expo), width 0.35s var(--ease-out-expo);
	box-shadow: 0 0 8px var(--accent);
	pointer-events: none;
}

/* ============================================================
   Panels
   ============================================================ */
.panel { display: none; }
.panel.active {
	display: block;
	animation: panelIn 0.35s var(--ease-out-expo);
}
@keyframes panelIn {
	from { opacity: 0; transform: translateY(8px); }
	to { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   Tables
   ============================================================ */
table {
	width: 100%%;
	border-collapse: collapse;
	font-size: 0.85rem;
}
th, td {
	padding: 10px 12px;
	text-align: left;
	border-bottom: 1px solid var(--border-subtle);
}
th {
	color: var(--text-secondary);
	font-weight: 600;
	font-size: 0.72rem;
	text-transform: uppercase;
	letter-spacing: 0.5px;
	position: sticky;
	top: 0;
	background: var(--surface-2);
	z-index: 1;
	border-bottom: 1px solid var(--border);
}
tbody tr {
	transition: background var(--transition);
}
tbody tr.clickable { cursor: pointer; }
tbody tr:hover { background: var(--accent-light); }

.badge {
	display: inline-flex;
	align-items: center;
	gap: 4px;
	padding: 2px 8px;
	border-radius: var(--radius-sm);
	font-size: 0.68rem;
	font-weight: 700;
	letter-spacing: 0.5px;
}
.badge-success { background: var(--success-light); color: var(--success); }
.badge-danger { background: var(--danger-light); color: var(--danger); }
.badge-warning { background: var(--warning-light); color: var(--warning); }

.model-bar { display: flex; align-items: center; gap: 8px; }
.model-bar-fill {
	height: 5px;
	background: linear-gradient(90deg, var(--accent) 0%%, var(--accent-hover) 100%%);
	border-radius: 3px;
	min-width: 2px;
	transition: width 0.5s var(--ease-out-expo);
	box-shadow: 0 0 4px var(--accent-light);
}
.model-bar-bg {
	flex: 1;
	height: 5px;
	background: var(--border-subtle);
	border-radius: 3px;
	overflow: hidden;
}
.model-bar-value {
	font-family: var(--font-mono);
	font-size: 0.78rem;
	font-variant-numeric: tabular-nums;
}
.cost-col {
	text-align: right;
	font-variant-numeric: tabular-nums;
	font-weight: 600;
	font-family: var(--font-mono);
}
.num-col {
	font-variant-numeric: tabular-nums;
	font-family: var(--font-mono);
}
.font-medium { font-weight: 500; }

/* ============================================================
   Empty States
   ============================================================ */
.empty-state {
	text-align: center;
	padding: 56px 20px;
	color: var(--text-secondary);
}
.empty-icon {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	width: 64px;
	height: 64px;
	border-radius: 50%%;
	background: var(--surface);
	border: 1px solid var(--border-subtle);
	margin-bottom: 14px;
	color: var(--text-tertiary);
}
.empty-icon svg { width: 28px; height: 28px; }
.empty-text { font-size: 0.9rem; line-height: 1.6; }
.empty-sub { font-size: 0.78rem; color: var(--text-tertiary); margin-top: 4px; }

/* ============================================================
   Filter Bar & Search
   ============================================================ */
.filter-bar {
	display: flex;
	flex-direction: column;
	gap: 10px;
	margin-bottom: 16px;
}
.filter-group-left {
	display: flex;
	align-items: center;
	gap: 10px;
	flex-wrap: wrap;
}
.filter-bar label {
	font-size: 0.8rem;
	color: var(--text-secondary);
	font-weight: 500;
	white-space: nowrap;
}
.search-wrapper {
	position: relative;
	display: flex;
	align-items: center;
}
.search-wrapper svg {
	position: absolute;
	left: 10px;
	width: 15px;
	height: 15px;
	color: var(--text-tertiary);
	pointer-events: none;
	transition: color var(--transition);
}
.search-wrapper:focus-within svg {
	color: var(--accent);
}
.search-input {
	padding: 7px 12px 7px 32px;
	border: 1px solid var(--border);
	border-radius: var(--radius-md);
	background: var(--surface-2);
	color: var(--text);
	font-size: 0.85rem;
	transition: all var(--transition);
	font-family: var(--font-sans);
	width: 280px;
	max-width: 100%%;
}
.search-input:focus {
	outline: none;
	border-color: var(--accent);
	box-shadow: var(--accent-glow);
}
.search-input::placeholder { color: var(--text-tertiary); }

/* ============================================================
   Forms & Unified Add Account Bar
   ============================================================ */
.form-row {
	display: flex;
	gap: 8px;
	align-items: center;
	flex-wrap: wrap;
}
.add-account-bar {
	background: var(--surface-2);
	border: 1px solid var(--border);
	border-radius: var(--radius-lg);
	padding: 14px 18px;
	box-shadow: var(--shadow-card);
	margin-bottom: 24px;
	display: flex;
	align-items: flex-end;
	gap: 12px;
	flex-wrap: wrap;
	transition: all var(--transition);
}
.add-account-bar:focus-within {
	border-color: var(--accent);
	box-shadow: var(--shadow-md);
}
.add-account-bar .field-group {
	flex: 1;
	min-width: 150px;
}
.add-account-bar select.input {
	cursor: pointer;
}
.add-account-bar .btn {
	height: 38px;
	padding: 0 16px;
}
.base-url-group {
	overflow: hidden;
	transition: max-width 0.3s var(--ease-out-expo), opacity 0.25s ease, flex 0.3s var(--ease-out-expo);
}
.base-url-group.hidden {
	max-width: 0;
	opacity: 0;
	flex: 0 0 0;
	min-width: 0;
	padding: 0;
	margin: 0;
	border: 0;
	pointer-events: none;
	overflow: hidden;
}
.base-url-group.hidden .field-group,
.base-url-group.hidden input { display: none; }
@media (max-width: 640px) {
	.add-account-bar {
		flex-direction: column;
		align-items: stretch;
	}
	.add-account-bar .field-group {
		width: 100%%;
	}
	.add-account-bar .btn {
		width: 100%%;
		margin-top: 4px;
	}
	.filter-bar {
		flex-direction: column;
		align-items: stretch;
		gap: 8px;
	}
	.filter-group-left {
		width: 100%%;
	}
	.search-wrapper {
		width: 100%%;
		margin-left: 0;
	}
	.search-input {
		width: 100%%;
	}
}
.field-group {
	display: flex;
	flex-direction: column;
	gap: 4px;
}
.field-label {
	font-size: 0.68rem;
	font-weight: 600;
	color: var(--text-secondary);
	text-transform: uppercase;
	letter-spacing: 0.5px;
}
.config-panel, .cookie-panel {
	background: var(--surface-2);
	border: 1px solid var(--border);
	border-radius: var(--radius-md);
	padding: 14px 16px;
	margin-bottom: 14px;
	display: flex;
	flex-direction: column;
	gap: 10px;
	box-shadow: var(--shadow-xs);
}
.config-panel .form-row, .cookie-panel .form-row { margin-bottom: 0; }

/* ============================================================
   Quota Cards with circular progress
   ============================================================ */
.quota-card {
	margin-bottom: 20px;
	border: 1px solid var(--border-subtle);
	border-radius: var(--radius-xl);
	padding: 24px;
	background: var(--surface-2);
	box-shadow: var(--shadow-card);
	transition: box-shadow var(--transition), transform var(--transition);
}
.quota-card:hover {
	box-shadow: var(--shadow-md);
	transform: translateY(-1px);
}
.quota-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 20px;
	flex-wrap: wrap;
	gap: 12px;
}
.quota-header-left {
	display: flex;
	align-items: center;
	gap: 10px;
	flex-wrap: wrap;
}
.quota-header-left h3 {
	margin: 0;
	font-size: 1.05rem;
	font-weight: 700;
	color: var(--text);
}
.quota-header-left .badge {
	font-size: 0.65rem;
	padding: 3px 8px;
	border-radius: var(--radius-sm);
	background: var(--success-light);
	color: var(--success);
	font-weight: 700;
	text-transform: none;
	letter-spacing: 0;
}
.quota-header-right {
	display: flex;
	gap: 6px;
	align-items: center;
	flex-wrap: wrap;
}

.usage-list {
	display: flex;
	flex-direction: column;
	gap: 14px;
}
.usage-row {
	background: var(--success-light);
	border-radius: var(--radius-md);
	padding: 14px 18px;
	display: flex;
	align-items: center;
	gap: 16px;
}
.usage-row.warn { background: var(--warning-light); }
.usage-row.danger { background: var(--danger-light); }
.usage-ring {
	flex-shrink: 0;
	width: 56px;
	height: 56px;
	position: relative;
}
.usage-ring svg { transform: rotate(-90deg); }
.usage-ring-bg-circle {
	stroke: var(--border-subtle);
}
.usage-ring-text {
	position: absolute;
	top: 50%%;
	left: 50%%;
	transform: translate(-50%%, -50%%);
	font-size: 0.72rem;
	font-weight: 700;
	font-family: var(--font-mono);
	font-variant-numeric: tabular-nums;
}
.usage-row-body { flex: 1; min-width: 0; }
.usage-row-head {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 6px;
}
.usage-row-label {
	font-size: 0.85rem;
	font-weight: 600;
	color: var(--text);
}
.usage-row-pct {
	font-size: 0.85rem;
	font-weight: 700;
	font-variant-numeric: tabular-nums;
	font-family: var(--font-mono);
}
.usage-row-pct.ok { color: var(--success); }
.usage-row-pct.warn { color: var(--warning); }
.usage-row-pct.danger { color: var(--danger); }
.usage-bar-track {
	width: 100%%;
	height: 5px;
	background: var(--border-subtle);
	border-radius: 3px;
	overflow: hidden;
	margin-bottom: 4px;
}
.usage-bar-fill {
	height: 100%%;
	border-radius: 3px;
	transition: width 0.6s var(--ease-out-expo);
}
.usage-bar-fill.ok { background: var(--success); }
.usage-bar-fill.warn { background: var(--warning); }
.usage-bar-fill.danger { background: var(--danger); }
.usage-row-desc {
	font-size: 0.75rem;
	color: var(--text-secondary);
	font-family: var(--font-mono);
}
.usage-row-footer {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-top: 4px;
	font-size: 0.75rem;
	font-family: var(--font-mono);
}
.usage-row-footer-left {

.quota-error {

/* ============================================================
   Toast Notifications
   ============================================================ */
#toast-container {
	position: fixed;
	bottom: 24px;
	right: 24px;
	z-index: 9999;
	display: flex;
	flex-direction: column;
	gap: 10px;
	pointer-events: none;
}
.toast {
	display: flex;
	align-items: center;
	gap: 10px;
	padding: 12px 16px;
	border-radius: var(--radius-md);
	background: var(--surface-2);
	border: 1px solid var(--border);
	box-shadow: var(--shadow-lg);
	font-size: 0.85rem;
	font-weight: 500;
	pointer-events: auto;
	animation: toastIn 0.3s var(--ease-out-expo);
	max-width: 360px;
}
.toast.removing { animation: toastOut 0.25s var(--ease-out-expo) forwards; }
.toast svg { width: 18px; height: 18px; flex-shrink: 0; }
.toast-success { border-left: 3px solid var(--success); }
.toast-success svg { color: var(--success); }
.toast-error { border-left: 3px solid var(--danger); }
.toast-error svg { color: var(--danger); }
.toast-warning { border-left: 3px solid var(--warning); }
.toast-warning svg { color: var(--warning); }
@keyframes toastIn {
	from { opacity: 0; transform: translateX(100px); }
	to { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
	to { opacity: 0; transform: translateX(100px); }
}

/* ============================================================
   Drawer Panel
   ============================================================ */
#drawer-overlay {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.4);
	z-index: 8000;
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.25s ease;

}
#drawer-overlay.open {

}
#drawer-panel {
	position: fixed;
	top: 0;
	right: 0;
	bottom: 0;
	width: 460px;
	max-width: 100%%;
	background: var(--bg);
	border-left: 1px solid var(--border);

}
#drawer-panel.open { transform: translateX(0); }
.drawer-header {

	align-items: center;
	padding: 20px 24px;

.drawer-field-label {

.drawer-error-box {

.drawer-token-row:last-child { border-bottom: none; }
.drawer-token-label { font-size: 0.82rem; color: var(--text-secondary); }
.drawer-token-value {
	font-family: var(--font-mono);

/* ============================================================
   Responsive

@media (max-width: 1024px) {

<script>
/* ============================================================

const ICONS = {

	database: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>',

	key: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>',

function icon(name, size) {
	const svg = ICONS[name] || '';
	if (size) return svg.replace('<svg ', '<svg width="' + size + '" height="' + size + '" ');
	return svg;
}

/* ============================================================
   Utilities
   ============================================================ */
function esc(s) {
	if (s === undefined || s === null) return '';
	return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatNum(n){if(n===undefined||n===null)return'0';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString();}
function formatMs(ms){if(!ms||ms<=0)return'\u2014';if(ms>=1000)return(ms/1000).toFixed(1)+'s';return ms.toFixed(0)+'ms';}
function formatCost(c){return'$'+(c||0).toFixed(4);}
function formatBytes(b){if(!b)return'0 B';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}
function formatDuration(sec){if(!sec)return'\u2014';if(sec<60)return sec+'s';if(sec<3600)return Math.floor(sec/60)+'m';return Math.floor(sec/3600)+'h'+Math.floor((sec%%60)/60)+'m';}
function formatResetTime(sec){if(!sec||sec<=0)return'';var d=Math.floor(sec/86400),h=Math.floor((sec%%86400)/3600),m=Math.floor((sec%%3600)/60);var p=[];if(d>0)p.push(d+'d');if(h>0)p.push(h+'h');if(m>0)p.push(m+'min');return p.length>0?'Resets in '+p.join(' '):'';}
function rangeValue(){return document.getElementById('rangeSelect').value;}

/* ============================================================
   Toast System
   ============================================================ */
function showToast(msg, type) {
	type = type || 'success';
	const container = document.getElementById('toast-container');
	const iconMap = { success: 'checkCircle', error: 'xCircle', warning: 'alert' };
	const el = document.createElement('div');
	el.className = 'toast toast-' + type;
	el.innerHTML = icon(iconMap[type]) + '<span>' + esc(msg) + '</span>';
	container.appendChild(el);
	setTimeout(function() {
		el.classList.add('removing');
		setTimeout(function() { el.remove(); }, 250);
	}, 3000);
}

/* ============================================================
   Button Loading
   ============================================================ */
function setBtnLoading(btn, loading, doneText) {
	if (!btn) return;
	if (loading) {
		btn.dataset.origHtml = btn.innerHTML;
		btn.classList.add('is-loading');
		btn.innerHTML = '<svg class="btn-spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56" stroke-linecap="round"/></svg>' + (btn.textContent.trim() || '');
	} else {
		btn.classList.remove('is-loading');
		if (doneText) {
			btn.innerHTML = icon('check') + ' ' + esc(doneText);
			setTimeout(function() { btn.innerHTML = btn.dataset.origHtml || ''; }, 2000);
		} else {
			btn.innerHTML = btn.dataset.origHtml || '';
		}
	}
}

/* ============================================================
   Drawer Panel
   ============================================================ */
function openDrawer(html) {
	const panel = document.getElementById('drawer-panel');
	const overlay = document.getElementById('drawer-overlay');
	panel.innerHTML = html;
	overlay.classList.add('open');
	panel.classList.add('open');
	document.body.style.overflow = 'hidden';
	panel.focus();
}
function closeDrawer() {
	document.getElementById('drawer-overlay').classList.remove('open');
	document.getElementById('drawer-panel').classList.remove('open');
	document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
	if (e.key === 'Escape') closeDrawer();
});

function showEventDetail(e) {
	const badge = e.failed
		? '<span class="badge badge-danger">FAILED</span>'
		: '<span class="badge badge-success">OK</span>';
	let tokenRows = '';
	const tokenData = [
		['Total', formatNum(e.total_tokens)],
		['Input', formatNum(e.input_tokens)],
		['Output', formatNum(e.output_tokens)],
		['Cache Hit Rate', (e.cache_hit_rate||0).toFixed(1) + '%%']
	];
	for (const [label, val] of tokenData) {
		tokenRows += '<div class="drawer-token-row"><span class="drawer-token-label">' + label + '</span><span class="drawer-token-value">' + val + '</span></div>';
	}
	let errorBox = '';
	if (e.failed && e.failure_body) {
		errorBox = '<div class="drawer-section"><div class="drawer-section-title">Error Details</div><div class="drawer-error-box">' + esc(e.failure_body) + '</div></div>';
	}
	const html = `
		<div class="drawer-header">
			<h3>Event Detail</h3>
			<button class="btn btn-icon" onclick="closeDrawer()">${icon('x')}</button>
		</div>
		<div class="drawer-body">
			<div class="drawer-section">
				<div class="drawer-section-title">Overview</div>
				<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
					${badge}
					<span style="font-family:var(--font-mono);font-size:0.82rem;color:var(--text-secondary)">${esc(e.timestamp ? new Date(e.timestamp).toLocaleString() : '\u2014')}</span>
				</div>
			</div>
			<div class="drawer-section">
				<div class="drawer-grid">
					<div><div class="drawer-field-label">Model</div><div class="drawer-field-value">${esc(e.model||'\u2014')}</div></div>
					<div><div class="drawer-field-label">Provider</div><div class="drawer-field-value">${esc(e.provider||'\u2014')}</div></div>
					<div><div class="drawer-field-label">Auth ID</div><div class="drawer-field-value">${esc(e.auth_id||'\u2014')}</div></div>
					<div><div class="drawer-field-label">Executor</div><div class="drawer-field-value">${esc(e.executor_type||'\u2014')}</div></div>
				</div>
			</div>

/* ============================================================
   SVG Sparkline (for cards)
   ============================================================ */
function sparkline(values, color) {
	color = color || 'var(--accent)';
	if (!values || values.length < 2) return '';
	const max = Math.max.apply(null, values);
	const min = Math.min.apply(null, values);
	const range = max - min || 1;
	const w = 100, h = 32;
	const step = w / (values.length - 1);
	let pts = '';
	for (let i = 0; i < values.length; i++) {
		const x = i * step;
		const y = h - ((values[i] - min) / range) * h;
		pts += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
	}
	return `<svg class="card-sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${pts}" fill="none" stroke="${color}" stroke-width="1.5" opacity="0.3"/></svg>`;
}

/* ============================================================
   SVG Circular Progress (for quota)
   ============================================================ */
function ringProgress(pct, cls) {
	const r = 24, stroke = 4;
	const circumference = 2 * Math.PI * r;
	const fillLen = (pct / 100) * circumference;
	const colorVar = cls === 'ok' ? 'var(--success)' : (cls === 'warn' ? 'var(--warning)' : 'var(--danger)');
	return `<div class="usage-ring">
		<svg width="56" height="56">
			<circle class="usage-ring-bg-circle" cx="28" cy="28" r="${r}" fill="none" stroke-width="${stroke}"/>
			<circle cx="28" cy="28" r="${r}" fill="none" stroke="${colorVar}" stroke-width="${stroke}"
				stroke-dasharray="${circumference}" stroke-dashoffset="${circumference - fillLen}"
				stroke-linecap="round" style="transition:stroke-dashoffset 0.6s var(--ease-out-expo)"/>
		</svg>
		<span class="usage-ring-text">${pct.toFixed(0)}%%</span>
	</div>`;
}

/* ============================================================
   Empty State
   ============================================================ */
function emptyState(iconName, text, sub) {
	return `<div class="empty-state">
		<div class="empty-icon">${icon(iconName)}</div>
		<div class="empty-text">${esc(text)}</div>

}

const API_BASE = window.location.pathname.replace(/\/dashboard$/,'') + '/api';

function moveTabIndicator(tabBtn) {
	const indicator = document.getElementById('tabIndicator');
	const bar = document.getElementById('tabBar');
	const left = tabBtn.offsetLeft - bar.scrollLeft;
	const width = tabBtn.offsetWidth;
	indicator.style.left = left + 'px';

function switchTab(name) {
	document.querySelectorAll('.tab').forEach(function(t) {

}

/* ============================================================
   Data fetching
   ============================================================ */
async function fetchJSON(path, extra) {
	var url = API_BASE + path + '?range=' + rangeValue();
	if (extra) Object.keys(extra).forEach(function(k) { if (extra[k]) url += '&' + k + '=' + encodeURIComponent(extra[k]); });
	const resp = await fetch(url);
	if (!resp.ok) throw new Error('HTTP ' + resp.status);
	return resp.json();
}

async function renderModels() {
	var prov = document.getElementById('providerFilter').value;
	const models = await fetchJSON('/models', { provider: prov });
	const q = (document.getElementById('modelSearch').value || '').toLowerCase().trim();
	const filtered = q ? models.filter(function(m) {
		return (m.model||'').toLowerCase().includes(q) || (m.provider||'').toLowerCase().includes(q);
	}) : models;
	if (!filtered || filtered.length === 0) {
		document.getElementById('modelTable').innerHTML = q
			? emptyState('database', 'No models match "' + q + '"', 'Try a different search term.')
			: emptyState('database', 'No usage data for this time range.', 'Data will appear here once requests are processed.');
		buildProviderFilter(models);
		return;
	}
	const maxT = Math.max.apply(null, models.map(function(m) { return m.total_tokens; }).concat([1]));
	document.getElementById('modelTable').innerHTML = `
		<table><thead><tr><th>Model</th><th>Requests</th><th>Tokens</th><th>Input</th><th>Output</th><th>Cost</th></tr></thead><tbody>
		${filtered.map(function(m) {
			const pct = Math.max((m.total_tokens / maxT) * 100, 1);
			return `<tr>
				<td class="font-medium">${esc(m.model)}</td>
				<td class="num-col">${formatNum(m.requests)}</td>
				<td><div class="model-bar"><div class="model-bar-bg"><div class="model-bar-fill" style="width:${pct}%%"></div></div><span class="model-bar-value">${formatNum(m.total_tokens)}</span></div></td>
				<td class="num-col">${formatNum(m.input_tokens)}</td>
				<td class="num-col">${formatNum(m.output_tokens)}</td>
				<td class="cost-col">${formatCost(m.cost)}</td>
			</tr>`;
		}).join('')}
		</tbody></table>`;
	buildProviderFilter(models);
}
function buildProviderFilter(models) {
	var sel = document.getElementById('providerFilter');
	var seen = {};
	var cur = sel.value;
	sel.innerHTML = '<option value="">All Providers</option>';
	models.forEach(function(m) {
		var p = (m.provider || 'Unknown').trim();
		if (p && !seen[p]) {
			seen[p] = true;
			var o = document.createElement('option');
			o.value = p;
			o.textContent = p.split('-').slice(-2).join('-');
			sel.appendChild(o);
		}
	});
	if (cur && seen[cur]) sel.value = cur;
}

let lastPricesData = null;
async function renderPricing() {
	let data = lastPricesData;
	if (!data) {

	}
	const prices = data.prices || {};
	let entries = Object.entries(prices);

	if (q) {
		entries = entries.filter(function(pair) { return pair[0].toLowerCase().includes(q); });
	}
	let formHtml = `<div class="form-row">
		<input class="input" type="text" id="pricing-model" placeholder="model name" style="width:180px">
		<input class="input" type="number" id="pricing-prompt" placeholder="prompt" step="0.0001" style="width:100px">

		<input class="input" type="number" id="pricing-cache" placeholder="cache" step="0.0001" style="width:100px">

		<button class="btn btn-sm" onclick="syncPrices()" id="syncBtn" style="margin-left:auto">${icon('refresh')} Sync from modelprice.boxtech.icu</button>

	if (entries.length === 0) {

			q ? 'No pricing matches "' + q + '"' : 'No pricing configured yet',
			'Add model pricing above (all values in $ per 1M tokens).');
		return;
	}
	document.getElementById('pricingTable').innerHTML = formHtml + `
		<table><thead><tr><th>Model</th><th>Prompt $/1M</th><th>Completion $/1M</th><th>Cache $/1M</th><th></th></tr></thead><tbody>
		${entries.map(function(pair) {
			const model = pair[0], price = pair[1];
			return `<tr>
				<td class="font-medium">${esc(model)}</td>
				<td class="num-col">$${(price.prompt||0).toFixed(4)}</td>
				<td class="num-col">$${(price.completion||0).toFixed(4)}</td>
				<td class="num-col">$${(price.cache||0).toFixed(4)}</td>

async function addPrice() {
	var model = document.getElementById('pricing-model').value.trim();
	var p = parseFloat(document.getElementById('pricing-prompt').value) || 0;
	var c = parseFloat(document.getElementById('pricing-completion').value) || 0;
	var ca = parseFloat(document.getElementById('pricing-cache').value) || 0;
	if (!model) { showToast('Model name is required', 'warning'); return; }
	try {
		await fetch(API_BASE + '/prices?action=set&model=' + encodeURIComponent(model) + '&prompt=' + p + '&completion=' + c + '&cache=' + ca);
		lastPricesData = null;
		await renderPricing();
		showToast('Price added for ' + model, 'success');
	} catch(e) { showToast('Failed to add price', 'error'); }
}
async function deletePrice(model) {
	try {
		await fetch(API_BASE + '/prices?action=delete&model=' + encodeURIComponent(model));
		lastPricesData = null;
		await renderPricing();
		showToast('Deleted ' + model, 'success');
	} catch(e) { showToast('Failed to delete', 'error'); }
}
async function syncPrices() {
	var btn = document.getElementById('syncBtn');
	if (!btn) return;
	setBtnLoading(btn, true);
	try {
		const resp = await fetch(API_BASE + '/prices/sync');
		const data = await resp.json();
		lastPricesData = null;
		await renderPricing();
		const newBtn = document.getElementById('syncBtn');
		setBtnLoading(newBtn, false, 'Synced ' + data.synced + ' models');
		showToast('Synced ' + data.synced + ' models', 'success');
	} catch(e) {
		const newBtn = document.getElementById('syncBtn');
		setBtnLoading(newBtn, false);
		showToast('Sync failed', 'error');
	}
}

			<div class="field-group"><label class="field-label">Auth cookie</label><input class="input" type="text" id="cookie-val-${esc(acct.name)}" placeholder="Paste auth cookie value"></div>
			<div class="field-group"><label class="field-label">Workspace ID</label><input class="input" type="text" id="ws-val-${esc(acct.name)}" placeholder="wrk_xxx or leave empty for auto"></div>
			<button class="btn btn-sm" onclick='saveAccountConfig(${JSON.stringify(acct.name)})'>Save & Fetch</button>
		</div>`;
	}

	let windowsHtml = '';
	if (acct.windows && acct.windows.length > 0) {
		windowsHtml = '<div class="usage-list">';
		for (const w of acct.windows) {
			if (acct.type === 'deepseek') {
				windowsHtml += `<div class="usage-row ok">
					<div class="usage-row-body">
						<div class="usage-row-head"><span class="usage-row-label">${esc(w.label)}</span></div>
						<div class="usage-row-desc">${w.remaining.toFixed(2)} ${esc(w.unit)} remaining</div>
						${w.reset_in_sec>0?`<div class="usage-row-reset">${formatResetTime(w.reset_in_sec)}</div>`:''}
					</div>
				</div>`;
			} else {
				var pct = w.remaining;
				var cls = pct > 50 ? 'ok' : (pct > 20 ? 'warn' : 'danger');
				windowsHtml += `<div class="usage-row ${cls}">
					${ringProgress(pct, cls)}
					<div class="usage-row-body">
						<div class="usage-row-head">
							<span class="usage-row-label">${esc(w.label)}</span>
							<span class="usage-row-pct ${cls}">${w.remaining.toFixed(1)}%%</span>
						</div>
						<div class="usage-bar-track"><div class="usage-bar-fill ${cls}" style="width:${pct}%%"></div></div>
						<div class="usage-row-footer">
							<span class="usage-row-footer-left">${w.used.toFixed(1)}%% used</span>
							${w.reset_in_sec>0?`<span class="usage-row-footer-right">${formatResetTime(w.reset_in_sec)}</span>`:''}
						</div>
					</div>
				</div>`;
			}
		}
		windowsHtml += '</div>';
	}

	let modelUsageHtml = '';
	if (acct.model_usage && acct.model_usage.length > 0) {
		var mu = acct.model_usage.map(function(m) { return esc(m.model) + ' ' + formatNum(m.tokens); });
		modelUsageHtml = '<div style="margin-top:12px;font-size:0.8rem;color:var(--text-secondary)">Models (24h): ' + mu.join(', ') + '</div>';
	}

	let tsHtml = '';
	if (acct.updated_at) {
		tsHtml = '<div class="timestamp">Updated ' + new Date(acct.updated_at).toLocaleString() + '</div>';
	}

	let errorHtml = '';
	if (!acct.success) {
		errorHtml = '<div class="quota-error">' + esc(acct.error || 'Unknown error') + '</div>';
	}

	return `<div class="quota-card">
		<div class="quota-header">
			<div class="quota-header-left">
				<span class="badge" style="background:${planColor}">${planLabel}</span>
				<h3>${esc(acct.name)}</h3>
			</div>
			<div class="quota-header-right">${actions}</div>
		</div>
		${errorHtml}
		${configPanel}
		${windowsHtml}
		${modelUsageHtml}
		${tsHtml}
	</div>`;
}

/* ============================================================
   Unified Add Account Bar
   ============================================================ */
function onPlatformChange() {
	const platform = document.getElementById('unified-platform').value;
	const credLabel = document.getElementById('unified-cred-label');
	const credInput = document.getElementById('unified-cred');
	const baseGroup = document.getElementById('unified-base-group');
	if (platform === 'opencode') {
		credLabel.textContent = 'Auth Cookie';
		credInput.placeholder = 'optional';
		baseGroup.classList.add('hidden');
	} else if (platform === 'glm') {
		credLabel.textContent = 'API Key';
		credInput.placeholder = 'sk-...';
		baseGroup.classList.remove('hidden');
	} else if (platform === 'deepseek') {
		credLabel.textContent = 'API Key';
		credInput.placeholder = 'sk-...';
		baseGroup.classList.add('hidden');
	}
}

async function addUnifiedAccount() {
	const platform = document.getElementById('unified-platform').value;
	const name = document.getElementById('unified-acct-name').value.trim();
	const cred = document.getElementById('unified-cred').value.trim();
	const base = document.getElementById('unified-base').value.trim();
	if (!name) { showToast('Account name required', 'warning'); return; }
	try {
		if (platform === 'opencode') {
			await fetch(API_BASE + '/opencode-quota?action=addaccount&account=' + encodeURIComponent(name) + '&cookie=' + encodeURIComponent(cred));
		} else if (platform === 'glm') {
			await fetch(API_BASE + '/glmcoding-quota?action=addaccount&account=' + encodeURIComponent(name) + '&api_key=' + encodeURIComponent(cred) + '&base_url=' + encodeURIComponent(base));
		} else if (platform === 'deepseek') {
			await fetch(API_BASE + '/deepseek-quota?action=addaccount&account=' + encodeURIComponent(name) + '&api_key=' + encodeURIComponent(cred));
		}
		showToast('Added ' + name, 'success');
		// Reset form
		document.getElementById('unified-acct-name').value = '';
		document.getElementById('unified-cred').value = '';
		await renderQuota();
	} catch(e) { showToast('Failed to add ' + name, 'error'); }
}

/* ============================================================
   Refresh orchestrator
   ============================================================ */
async function refreshAll() {
	try {
		const summary = await fetchJSON('/summary');
		renderCards(summary);
		lastEventsData = null;
		lastPricesData = null;
		await renderModels();
		if (document.getElementById('panel-events').classList.contains('active')) await renderEvents();
		if (document.getElementById('panel-pricing').classList.contains('active')) await renderPricing();
		if (document.getElementById('panel-health').classList.contains('active')) await renderHealth();
		if (document.getElementById('panel-quota').classList.contains('active')) await renderQuota();
	} catch(e) { console.error('refresh failed', e); }
}

let refreshTimer = null;
let refreshIntervalMs = %d;
function setRefreshInterval(seconds) {
	refreshIntervalMs = parseInt(seconds) * 1000;
	if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
	if (refreshIntervalMs > 0) {
		refreshTimer = setInterval(refreshAll, refreshIntervalMs);
		document.getElementById('refreshDot').classList.remove('paused');
	} else {
		document.getElementById('refreshDot').classList.add('paused');
	}
}

/* ============================================================
   Init
   ============================================================ */
document.getElementById('refreshSelect').value = '%d';
setRefreshInterval(%d);
moveTabIndicator(document.querySelector('.tab.active'));
refreshAll();
