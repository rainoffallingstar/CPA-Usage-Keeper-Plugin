name: Build Plugin

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.x'
          cache: true
          cache-dependency-path: go.mod

      - name: Run Go tests
        run: go test -v -race ./...

  test-js:
    name: Test JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Check JS syntax
        run: node --check dashboard/helpers.js

      - name: Run JS tests
        run: node --test dashboard/*.test.js

  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: [test-go, test-js]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: so
            cc: gcc
            apt: ''
          - platform: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: so
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - platform: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: dylib
            cc: clang -arch x86_64
            apt: ''
          - platform: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: dylib
            cc: clang -arch arm64
            apt: ''
          - platform: windows-amd64
            runner: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: dll
            cc: x86_64-w64-mingw32-gcc
            apt: gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install cross compiler
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.x'
          cache: true
          cache-dependency-path: go.mod

      - name: Build plugin
        run: |
          mkdir -p dist
          output="dist/usage-keeper-${{ matrix.platform }}.${{ matrix.ext }}"
          export CC="${{ matrix.cc }}"
          export CGO_ENABLED=1
          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"
          go build -trimpath -buildmode=c-shared -ldflags "-s -w -X main.pluginVersion=$(git describe --tags --always 2>/dev/null || echo '0.1.0')" -o "$output" .
          rm -f dist/usage-keeper*.h
          ls -lh "$output"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: usage-keeper-plugin-${{ matrix.platform }}
          path: dist/usage-keeper-${{ matrix.platform }}.${{ matrix.ext }}
          retention-days: 90

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: usage-keeper-plugin-*
          path: dist
          merge-multiple: true

      - name: Package release assets
        run: |
          cd dist
          sha256sum usage-keeper-* > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/usage-keeper-linux-amd64.so
            dist/usage-keeper-linux-arm64.so
            dist/usage-keeper-darwin-amd64.dylib
            dist/usage-keeper-darwin-arm64.dylib
            dist/usage-keeper-windows-amd64.dll
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
